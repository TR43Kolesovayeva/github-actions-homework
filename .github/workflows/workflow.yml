name: Python Tests with Coverage

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests with coverage
        run: >
          python -m pytest
          --cov=myapp
          --cov-report=html
          --cov-report=term-missing
          --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  build:
    name: Build application
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build application
        run: python -m compileall myapp

      - name: Add workflow badge to README
        if: github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          BADGE_MARKER="actions/workflows/workflow.yml/badge.svg"
          BADGE='[![Python Tests with Coverage](https://github.com/TR43Kolesovayeva/github-actions-homework/actions/workflows/workflow.yml/badge.svg?event=pull_request)](https://github.com/TR43Kolesovayeva/github-actions-homework/actions/workflows/workflow.yml)'

          if grep -q "$BADGE_MARKER" README.md; then
            echo "Workflow badge already exists in README.md."
          else
            printf '\n%s\n' "$BADGE" >> README.md
            echo "Workflow badge added to README.md."
          fi

      - name: Commit and push README changes
        if: github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          if git diff --quiet README.md; then
            echo "README.md has no new changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "Add workflow status badge"
          git push origin HEAD:${{ github.head_ref }}